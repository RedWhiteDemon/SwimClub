<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwimClub | Новый пароль</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .reset-page {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }
      .reset-card {
        max-width: 420px;
        width: 100%;
      }
      .reset-card h1 {
        margin: 0 0 12px;
        font-size: 1.35rem;
      }
    </style>
  </head>
  <body>
    <div class="reset-page">
      <div class="card reset-card">
        <h1>Новый пароль</h1>
        <p class="modal-muted" id="reset-hint">Укажите новый пароль для аккаунта (не меньше 8 символов).</p>
        <p class="modal-error hidden" id="reset-error" role="alert"></p>
        <p class="modal-success hidden" id="reset-done" role="status"></p>
        <form id="reset-form" class="modal-form hidden">
          <div class="field">
            <label class="field__label" for="reset-pass">Новый пароль</label>
            <div class="field__password">
              <input
                class="field__control field__control--with-toggle"
                type="password"
                id="reset-pass"
                name="password"
                required
                minlength="8"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="field__password-toggle"
                aria-label="Показать пароль"
                aria-pressed="false"
                data-password-for="reset-pass"
              >
                <svg class="field__password-icon field__password-icon--show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg class="field__password-icon field__password-icon--hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1 4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label class="field__label" for="reset-pass2">Повторите пароль</label>
            <input
              class="field__control"
              type="password"
              id="reset-pass2"
              required
              minlength="8"
              autocomplete="new-password"
            />
          </div>
          <button type="submit" class="btn modal-submit">Сохранить пароль</button>
        </form>
        <p class="modal-muted hidden" id="reset-bad-link">Ссылка недействительна или устарела. Запросите восстановление ещё раз из формы входа.</p>
        <p id="reset-home-wrap" class="hidden" style="margin-top: 16px">
          <a href="index.html" class="btn">На главную</a>
        </p>
      </div>
    </div>
    <script>
      function getApiBase() {
        if (typeof window !== "undefined" && window.SWIMCLUB_API_BASE != null && String(window.SWIMCLUB_API_BASE).trim() !== "") {
          var b = String(window.SWIMCLUB_API_BASE).trim().replace(/\/$/, "");
          return b.endsWith("/api") ? b : b + "/api";
        }
        var o = window.location.origin;
        if (!o || o === "null" || o.startsWith("file:")) {
          return "http://localhost:3000/api";
        }
        var host = window.location.hostname;
        var port = window.location.port;
        var isLocal = host === "localhost" || host === "127.0.0.1";
        var likelyStatic = { "5500": 1, "5501": 1, "5173": 1, "4173": 1 };
        if (isLocal && likelyStatic[port]) {
          return "http://localhost:3000/api";
        }
        return o.replace(/\/$/, "") + "/api";
      }

      function humanizeApiErr(msg) {
        if (typeof msg !== "string") return msg || "Ошибка.";
        if (msg.indexOf("<!DOCTYPE") >= 0 || msg.indexOf("<html") >= 0 || msg.indexOf("Cannot POST") >= 0) {
          return "API недоступен: откройте сайт через http://localhost:3000 (npm run dev) или задайте window.SWIMCLUB_API_BASE.";
        }
        return msg;
      }

      function getResetTokenFromHash() {
        const raw = window.location.hash.replace(/^#/, "");
        if (!raw) return "";
        return new URLSearchParams(raw).get("token") || "";
      }

      function show(el, on) {
        if (!el) return;
        el.classList.toggle("hidden", !on);
      }

      function initPasswordVisibilityToggles() {
        document.querySelectorAll("[data-password-for]").forEach(function (btn) {
          var id = btn.getAttribute("data-password-for");
          var input = id ? document.getElementById(id) : null;
          if (!input || input.tagName !== "INPUT") return;
          btn.addEventListener("click", function () {
            var revealed = input.type === "password";
            input.type = revealed ? "text" : "password";
            btn.setAttribute("aria-pressed", revealed ? "true" : "false");
            btn.setAttribute("aria-label", revealed ? "Скрыть пароль" : "Показать пароль");
          });
        });
      }

      document.getElementById("reset-form")?.addEventListener("submit", async function (e) {
        e.preventDefault();
        var errEl = document.getElementById("reset-error");
        var token = getResetTokenFromHash();
        var p1 = document.getElementById("reset-pass")?.value || "";
        var p2 = document.getElementById("reset-pass2")?.value || "";
        show(errEl, false);
        if (p1 !== p2) {
          show(errEl, true);
          if (errEl) errEl.textContent = "Пароли не совпадают.";
          return;
        }
        try {
          var url = getApiBase() + "/auth/reset-password";
          var res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify({ token: token, password: p1 })
          });
          var text = await res.text();
          var data = null;
          if (text) {
            try {
              data = JSON.parse(text);
            } catch (_) {
              data = { error: text };
            }
          }
          if (!res.ok) {
            show(errEl, true);
            if (errEl) errEl.textContent = humanizeApiErr((data && data.error) || "Ошибка.");
            return;
          }
          var done = document.getElementById("reset-done");
          var form = document.getElementById("reset-form");
          var hint = document.getElementById("reset-hint");
          if (form) show(form, false);
          if (hint) show(hint, false);
          show(done, true);
          if (done) done.textContent = "Пароль обновлён. Теперь можно войти на сайт.";
          show(document.getElementById("reset-home-wrap"), true);
        } catch (_) {
          show(errEl, true);
          if (errEl) errEl.textContent = "Не удалось связаться с сервером.";
        }
      });

      (function init() {
        initPasswordVisibilityToggles();
        var token = getResetTokenFromHash();
        var bad = document.getElementById("reset-bad-link");
        var form = document.getElementById("reset-form");
        if (!token) {
          show(bad, true);
          show(form, false);
          show(document.getElementById("reset-hint"), false);
          show(document.getElementById("reset-home-wrap"), true);
          return;
        }
        show(form, true);
      })();
    </script>
  </body>
</html>
